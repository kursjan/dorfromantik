# Auto-allow testing commands without asking for permission
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["CI=true npm run test:unit", "npm run test:unit", "npm test", "npm run typecheck", "npx putout", "npm run lint", "npm run test:e2e", "npm run test:e2e:ci"]
decision = "allow"
priority = 100
